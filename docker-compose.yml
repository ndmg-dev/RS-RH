version: "3.9"

services:
  # ─── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mgca-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) { 0 }
        "
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mgca-network

  # ─── Replica Set Initializer (one-shot) ──────────────────────────────
  mongo-init-replica:
    image: mongo:7.0
    container_name: mgca-mongo-init
    depends_on:
      mongodb:
        condition: service_started
    entrypoint: >
      bash -c "
        echo 'Waiting for MongoDB to accept connections...';
        until mongosh --host mongodb --quiet --eval 'db.runCommand({ ping: 1 }).ok' 2>/dev/null; do
          sleep 2;
        done;
        echo 'MongoDB is up. Initiating replica set...';
        mongosh --host mongodb --eval \"
          try {
            rs.status();
            print('Replica set already initialized.');
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
            print('Replica set initiated successfully.');
          }
        \";
      "
    restart: "no"
    networks:
      - mgca-network

  # ─── Spring Boot Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mgca-backend
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/mgca_social_network?replicaSet=rs0}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-in-production-minimum-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
    networks:
      - mgca-network
    restart: unless-stopped

  # ─── Node.js Gateway / BFF ───────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: mgca-gateway
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      SPRING_BOOT_URL: http://backend:8080
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/mgca_social_network?replicaSet=rs0}
      GATEWAY_PORT: 3000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - mgca-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  mgca-network:
    driver: bridge
